<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santiago Exchange | React Redesign</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#0B1220',
                            gradStart: '#0F1B2D',
                            gradEnd: '#142742',
                            turquoise: '#16A7C8',
                            purple: '#5B5CF6',
                            purpleHover: '#6C6DF9',
                            textMain: '#F1F5F9',
                            textSec: '#9AA6B2',
                            border: '#1E2C45'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(91, 92, 246, 0.4)',
                        'img': '0 30px 60px rgba(0,0,0,0.35)',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 2s infinite',
                        'float-delayed-2': 'float 6s ease-in-out 4s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B1220; color: #F1F5F9; }
        .glass-pill {
            background: rgba(11, 18, 32, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 20);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-brand-navy/90 backdrop-blur-md border-b border-brand-border py-4' : 'bg-transparent py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                        {/* Logo Left */}
                        <div className="flex items-center gap-2 cursor-pointer">
                            <div className="w-8 h-8 rounded-lg bg-brand-turquoise flex flex-shrink-0 items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <span className="font-display font-semibold text-xl tracking-tight text-brand-textMain">
                                Santiago <strong className="font-bold">Exchange</strong>
                            </span>
                        </div>

                        {/* Center Links (Desktop) */}
                        <div className="hidden lg:flex items-center gap-8">
                            {['Residences', 'Community', 'Experiences', 'Chile Guide'].map((link) => (
                                <a key={link} href={`#${link.toLowerCase()}`} className="text-sm font-medium text-brand-textMain hover:text-brand-turquoise transition-colors">
                                    {link}
                                </a>
                            ))}
                        </div>

                        {/* Right Actions */}
                        <div className="flex items-center gap-6">
                            <a href="#login" className="hidden sm:block text-sm font-medium text-brand-textMain hover:text-brand-turquoise transition-colors">
                                Log in
                            </a>
                            <button className="bg-brand-turquoise hover:bg-[#128a9e] text-white text-sm font-semibold py-2.5 px-6 rounded-full transition-all shadow-[0_4px_14px_0_rgba(22,167,200,0.39)] hover:-translate-y-0.5">
                                Book Now
                            </button>
                        </div>
                    </div>
                </nav>
            );
        };

        const Hero = () => {
            return (
                <section className="relative min-h-screen bg-gradient-to-br from-brand-gradStart to-brand-gradEnd overflow-hidden flex items-center pt-24 pb-16">
                    {/* Abstract atmospheric grid overlay */}
                    <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiMxRTLDNDUiIGZpbGwtb3BhY2l0eT0iMC4yIj48cGF0aCBkPSJNMzYgMzR2LTRoLTJ2NGgtNHYyaDR2NGgyeXYtNGg0di0yaC00em0wLTMwVjMwSDMwVjBIMjB2MzBIMHYxMGgyMHYyMGgxMFYzMGgyMHoiLz48L2c+PC9nPjwvc3ZnPg==')] opacity-[0.03]"></div>
                    
                    <div className="max-w-7xl mx-auto px-6 w-full grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-8 items-center relative z-10">
                        
                        {/* Left Column: Text Content */}
                        <div className="flex flex-col items-start gap-6 max-w-xl">
                            {/* Glowing Pill Badge */}
                            <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-brand-purple/50 bg-brand-purple/10 text-brand-purple shadow-glow">
                                <span className="text-sm">✨</span>
                                <span className="text-sm font-medium text-brand-textMain">Join 500+ students this semester</span>
                            </div>

                            {/* Headline */}
                            <h1 className="font-display text-5xl md:text-6xl lg:text-[4rem] font-bold leading-[1.1] tracking-tight">
                                Vive tu experiencia de <br className="hidden md:block" />
                                <span className="text-brand-turquoise">intercambio</span> en Santiago
                            </h1>

                            {/* Subtitle */}
                            <p className="text-lg text-brand-textSec leading-relaxed">
                                Residencias para estudiantes internacionales completamente equipadas y ubicadas cerca de las principales universidades de Santiago.
                            </p>

                            {/* CTA Buttons */}
                            <div className="flex flex-col sm:flex-row items-center gap-4 mt-4 w-full sm:w-auto">
                                <button className="w-full sm:w-auto bg-brand-turquoise hover:bg-[#128a9e] text-white font-medium py-3.5 px-8 rounded-full transition-all shadow-[0_4px_14px_0_rgba(22,167,200,0.39)] hover:-translate-y-0.5">
                                    Explorar residencias
                                </button>
                                <button className="w-full sm:w-auto bg-transparent border border-brand-border hover:bg-brand-border/50 text-white font-medium py-3.5 px-8 rounded-full transition-all">
                                    Reservar habitación
                                </button>
                            </div>
                        </div>

                        {/* Right Column: Image & Floating Elements */}
                        <div className="relative w-full aspect-square md:aspect-[4/3] lg:aspect-square flex items-center justify-center">
                            
                            {/* Main Image Container */}
                            <div className="relative w-[90%] md:w-[80%] aspect-[4/5] rounded-[24px] overflow-hidden shadow-img animate-float">
                                <img 
                                    src="assets/images/comunidad.png" 
                                    alt="International Students in Santiago" 
                                    className="w-full h-full object-cover"
                                />
                                {/* Inner Gradient Overlay for depth */}
                                <div className="absolute inset-0 bg-gradient-to-t from-brand-navy/60 via-transparent to-transparent"></div>
                            </div>

                            {/* Floating Glass Pill 1 */}
                            <div className="absolute top-[10%] -left-[5%] md:left-[5%] glass-pill px-5 py-3 rounded-2xl flex items-center gap-3 animate-float-delayed shadow-xl">
                                <div className="w-10 h-10 rounded-full bg-brand-turquoise/20 flex items-center justify-center text-xl">📅</div>
                                <div>
                                    <p className="text-xs text-brand-textSec font-medium uppercase tracking-wider">Booking</p>
                                    <p className="text-sm font-semibold text-white">Instant Booking</p>
                                </div>
                            </div>

                            {/* Floating Glass Pill 2 */}
                            <div className="absolute bottom-[20%] -right-[5%] md:right-[0%] glass-pill px-5 py-3 rounded-2xl flex items-center gap-3 animate-float shadow-xl">
                                <div className="w-10 h-10 rounded-full bg-brand-purple/20 flex items-center justify-center text-xl">🌍</div>
                                <div>
                                    <p className="text-xs text-brand-textSec font-medium uppercase tracking-wider">Vibe</p>
                                    <p className="text-sm font-semibold text-white">Global Community</p>
                                </div>
                            </div>

                            {/* Floating Glass Pill 3 */}
                            <div className="absolute -bottom-[5%] left-[10%] md:left-[20%] glass-pill px-5 py-3 rounded-2xl flex items-center gap-3 animate-float-delayed-2 shadow-xl">
                                <div className="w-10 h-10 rounded-full bg-yellow-500/20 flex items-center justify-center text-xl">📍</div>
                                <div>
                                    <p className="text-xs text-brand-textSec font-medium uppercase tracking-wider">Transfer</p>
                                    <p className="text-sm font-semibold text-white">Safe Airport Pickup</p>
                                </div>
                            </div>

                        </div>
                    </div>
                </section>
            );
        };

        const App = () => {
            return (
                <div className="font-sans antialiased text-brand-textMain selection:bg-brand-turquoise/30 selection:text-white">
                    <Navbar />
                    <Hero />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
